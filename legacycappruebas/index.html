<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Cap Store - Catálogo</title>
    <!-- 1. Cargar Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Cargar React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 3. Cargar Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 4. Cargar Identity -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        @keyframes slide-in-right { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-slide-in-right { animation: slide-in-right 0.3s ease-out; }
        .animate-fade-in { animation: fade-in 0.5s ease-out; }
        .font-stencil { font-family: 'Impact', 'Arial Black', sans-serif; letter-spacing: 0.05em; }
        
        /* Ocultar scrollbar pero permitir scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* --- NUEVO: Estilos para la animación de Scroll --- */
        .fade-in-up {
            opacity: 0;
            transform: translateY(30px); /* Empieza 30px más abajo */
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            will-change: opacity, transform;
        }
        .fade-in-up.is-visible {
            opacity: 1;
            transform: translateY(0); /* Sube a su posición original */
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Iconos ---
        const ChevronLeft = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m15 18-6-6 6-6"/></svg>;
        const ChevronRight = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m9 18 6-6-6-6"/></svg>;
        const Instagram = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>;
        const MusicNote = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>;
        const SortAsc = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="M11 4h10"/><path d="M11 8h7"/><path d="M11 12h4"/></svg>;

        // --- Componente Tarjeta de Producto con SlideShow y Scroll Reveal ---
        const ProductCard = ({ product }) => {
            const [currentImageIndex, setCurrentImageIndex] = useState(0);
            const [isHovered, setIsHovered] = useState(false);
            
            // Estado y referencia para la animación de scroll
            const [isVisible, setIsVisible] = useState(false);
            const cardRef = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            // Si el elemento entra en la pantalla
                            if (entry.isIntersecting) {
                                setIsVisible(true);
                                // Una vez visible, dejamos de observarlo para que no se anime de nuevo al salir y entrar
                                observer.unobserve(entry.target);
                            }
                        });
                    },
                    {
                        threshold: 0.1, // Se activa cuando el 10% del elemento es visible
                        rootMargin: "50px" // Margen para empezar a cargar un poco antes
                    }
                );

                if (cardRef.current) {
                    observer.observe(cardRef.current);
                }

                return () => {
                    if (cardRef.current) {
                        observer.unobserve(cardRef.current);
                    }
                };
            }, []);

            useEffect(() => {
                let interval;
                if (isHovered && product.images && product.images.length > 1 && !product.isSoldOut) {
                    interval = setInterval(() => {
                        setCurrentImageIndex((prevIndex) => (prevIndex + 1) % product.images.length);
                    }, 1200);
                } else {
                    setCurrentImageIndex(0);
                }
                return () => clearInterval(interval);
            }, [isHovered, product.images, product.isSoldOut]);

            return (
                <div 
                    ref={cardRef}
                    className={`group bg-white rounded-lg shadow-sm hover:shadow-2xl transition-all duration-300 overflow-hidden border border-gray-100 relative fade-in-up ${isVisible ? 'is-visible' : ''}`}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                >
                    <div className="relative aspect-square overflow-hidden bg-gray-100">
                        {product.isSoldOut && (
                            <div className="absolute inset-0 bg-black/40 z-30 flex items-center justify-center backdrop-blur-[1px]">
                                <span className="bg-black/90 text-white px-6 py-2 font-stencil text-2xl border-4 border-white/90 transform -rotate-12 tracking-widest shadow-xl">
                                    AGOTADO
                                </span>
                            </div>
                        )}

                        {!product.isSoldOut && product.images && product.images.length > 1 && isHovered && (
                            <div className="absolute bottom-2 left-0 right-0 flex justify-center gap-1 z-20">
                                {product.images.map((_, idx) => (
                                    <div 
                                        key={idx} 
                                        className={`w-1.5 h-1.5 rounded-full shadow-sm transition-all ${idx === currentImageIndex ? 'bg-white scale-125' : 'bg-white/50'}`}
                                    />
                                ))}
                            </div>
                        )}

                        <img 
                            src={product.images && product.images.length > 0 ? product.images[currentImageIndex] : 'https://via.placeholder.com/500'} 
                            alt={product.name} 
                            className={`w-full h-full object-cover transition-transform duration-500 ${product.isSoldOut ? 'grayscale-[50%]' : 'grayscale group-hover:grayscale-0 group-hover:scale-110'}`} 
                        />
                        
                        {product.isNew && !product.isSoldOut && (
                            <span className="absolute top-4 left-4 bg-white text-black border border-black text-xs font-bold px-3 py-1 z-10">
                                NUEVO
                            </span>
                        )}
                    </div>
                    <div className="p-6">
                        <div className="flex justify-between items-start mb-2">
                            <p className="text-sm text-gray-500 font-medium uppercase tracking-wider">{product.category}</p>
                        </div>
                        <h3 className={`text-xl font-bold mb-2 ${product.isSoldOut ? 'text-gray-400 line-through' : 'text-gray-900'}`}>{product.name}</h3>
                        <div className="flex justify-between items-center">
                            <span className={`text-2xl font-bold ${product.isSoldOut ? 'text-gray-400' : 'text-gray-900'}`}>${product.price}</span>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
          // --- Datos de Productos ---
          // (Ahora el arreglo se llena automáticamente leyendo el panel de administración catalogo.json)
          const [products, setProducts] = useState([]);
          const [selectedCategory, setSelectedCategory] = useState("Todos");
          const [sortOption, setSortOption] = useState("default"); // Estado para el ordenamiento
          const categoryScrollRef = useRef(null); 

          useEffect(() => {
            fetch('./catalogo.json')
              .then(res => res.json())
              .then(data => {
                if (data && data.gorras) {
                  const loadedProducts = data.gorras.map((item, index) => {
                    let mappedImages = [];
                    // --- CORRECCIÓN DE LECTURA DE IMÁGENES ---
                    if (item.imagenes && item.imagenes.length > 0) {
                      mappedImages = item.imagenes.map(img => img.foto ? img.foto : img);
                    } else if (item.imagen) {
                      mappedImages = [item.imagen];
                    }
                    
                    return {
                      id: index,
                      name: item.modelo || 'Sin nombre',
                      price: item.precio || 0,
                      category: item.marca || 'Otros',
                      images: mappedImages,
                      isNew: item.nuevo !== undefined ? item.nuevo : true,
                      isSoldOut: item.agotado || false
                    };
                  });
                  setProducts(loadedProducts);
                }
              })
              .catch(err => console.log("Aún no se ha publicado el catálogo."));
          }, []);

          // Generamos las categorías dinámicamente según las marcas que subas
          const categories = ["Todos", ...new Set(products.map(p => p.category))];

          const filteredProducts = selectedCategory === "Todos" 
            ? products 
            : products.filter(p => p.category === selectedCategory);

          // Función para ordenar productos
          const getSortedProducts = () => {
            let sorted = [...filteredProducts];
            switch (sortOption) {
              case "date-asc": // Nueva lógica para "Menos recientes"
                return sorted.sort((a, b) => a.id - b.id);
              case "price-asc":
                return sorted.sort((a, b) => a.price - b.price);
              case "price-desc":
                return sorted.sort((a, b) => b.price - a.price);
              case "name-asc":
                return sorted.sort((a, b) => a.name.localeCompare(b.name));
              case "name-desc":
                return sorted.sort((a, b) => b.name.localeCompare(a.name));
              default:
                return sorted; // Por defecto es el orden del array (Más recientes)
            }
          };

          const displayedProducts = getSortedProducts();

          const scrollCategories = (direction) => {
            if (categoryScrollRef.current) {
                const { current } = categoryScrollRef;
                const scrollAmount = 120;
                if (direction === 'left') {
                    current.scrollLeft -= scrollAmount;
                } else {
                    current.scrollLeft += scrollAmount;
                }
            }
          };

          const handleCategoryClick = (cat, e) => {
            setSelectedCategory(cat);
            const container = categoryScrollRef.current;
            const button = e.currentTarget;

            if (container && button) {
                const containerRect = container.getBoundingClientRect();
                const buttonRect = button.getBoundingClientRect();
                const offset = (buttonRect.left + buttonRect.width / 2) - (containerRect.left + containerRect.width / 2);

                container.scrollTo({
                    left: container.scrollLeft + offset,
                    behavior: 'smooth'
                });
            }
          };

          return (
            <div className="min-h-screen bg-gray-50 font-sans text-gray-900">
              {/* Navegación */}
              <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-20">
                    <div className="flex-shrink-0 flex items-center gap-2 cursor-pointer group" onClick={() => setSelectedCategory("Todos")}>
                      <div className="w-10 h-10 bg-black text-white flex items-center justify-center rounded-lg font-bold text-xl">L</div>
                      <div className="flex flex-col leading-none">
                        <span className="font-extrabold text-2xl tracking-tighter font-stencil">LEGACY</span>
                        <span className="font-bold text-xs tracking-widest text-black group-hover:text-gray-600 transition-colors">CAP STORE</span>
                      </div>
                    </div>
                  </div>
                </div>
              </nav>

              {/* Hero Section - PORTADA ACTUALIZADA (Ajuste de posición) */}
              <div className="relative bg-black text-white overflow-hidden">
                <div className="absolute inset-0">
                  <img 
                    src="./portada-logo.jpg" 
                    alt="Hero Background" 
                    className="w-full h-full object-cover object-[center_50%] opacity-70" 
                  />
                </div>
                {/* Altura py-32 mantenida */}
                <div className="relative max-w-7xl mx-auto px-4 py-32 sm:px-6 lg:px-8 flex flex-col items-center text-center">
                  <div className="mb-2 text-white opacity-80"><MusicNote className="w-8 h-8 inline-block animate-bounce"/></div>
                  
                  {/* TÍTULO */}
                  <h1 className="text-3xl md:text-5xl font-extrabold tracking-tight mb-6 font-stencil uppercase drop-shadow-lg">
                    <span className="border-b-4 border-white pb-1">Estilo Urbano Sin Límites</span>
                  </h1>

                  {/* TEXTO AÑADIDO */}
                  <p className="text-lg md:text-xl text-gray-200 mb-8 max-w-2xl font-medium drop-shadow-md">
                    Diseño exclusivo, comodidad superior y el legado que te define.
                  </p>

                  <button onClick={() => document.getElementById('catalogo').scrollIntoView({ behavior: 'smooth' })} className="bg-white text-black px-6 py-3 font-bold text-base hover:bg-gray-200 transition-all transform hover:scale-105 border-2 border-transparent hover:border-white">
                    Ver Colección
                  </button>
                </div>
              </div>

              {/* Contenido Principal */}
              <main id="catalogo" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
                
                <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                  <h2 className="text-3xl font-bold text-gray-900 font-stencil tracking-wide">NUESTROS PRODUCTOS</h2>
                  
                  {/* --- CARRUSEL DE CATEGORÍAS COMPACTO --- */}
                  <div className="relative flex items-center max-w-[280px] sm:max-w-xs md:max-w-sm w-full"> 
                    <button onClick={() => scrollCategories('left')} className="p-2 hover:bg-gray-200 rounded-full z-10 transition-colors">
                        <ChevronLeft className="w-5 h-5" />
                    </button>
                    
                    <div ref={categoryScrollRef} className="flex gap-2 overflow-x-auto no-scrollbar scroll-smooth mx-2 w-full">
                        {categories.map(cat => (
                            <button 
                                key={cat} 
                                onClick={(e) => handleCategoryClick(cat, e)} 
                                className={`px-4 py-2 text-sm font-bold whitespace-nowrap transition-all border-2 flex-shrink-0 ${selectedCategory === cat ? 'bg-black text-white border-black' : 'bg-white text-gray-600 border-gray-200 hover:border-black hover:text-black'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    <button onClick={() => scrollCategories('right')} className="p-2 hover:bg-gray-200 rounded-full z-10 transition-colors">
                        <ChevronRight className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                {/* Barra de control: Contador y Ordenamiento */}
                <div className="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                    <p className="text-gray-500 font-medium text-sm">
                      Mostrando {displayedProducts.length} de {products.length} productos
                    </p>
                    
                    <div className="flex items-center gap-2">
                        <SortAsc className="w-4 h-4 text-gray-500" />
                        <select
                            value={sortOption}
                            onChange={(e) => setSortOption(e.target.value)}
                            className="border border-gray-300 rounded-md py-1 px-2 text-sm focus:outline-none focus:ring-1 focus:ring-black bg-white text-gray-700"
                        >
                            <option value="default">Más recientes</option>
                            <option value="date-asc">Menos recientes</option>
                            <option value="price-asc">Precio: Menor a Mayor</option>
                            <option value="price-desc">Precio: Mayor a Menor</option>
                            <option value="name-asc">Nombre: A - Z</option>
                            <option value="name-desc">Nombre: Z - A</option>
                        </select>
                    </div>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                  {displayedProducts.map((product) => (
                    <ProductCard key={product.id} product={product} />
                  ))}
                </div>
              </main>

              {/* Footer */}
              <footer className="bg-black text-white pt-16 pb-8 border-t-4 border-gray-800">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-12 mb-12">
                    {/* Columna Izquierda: Marca */}
                    <div>
                      <div className="flex items-center gap-2 mb-4">
                         <div className="w-8 h-8 bg-white text-black flex items-center justify-center rounded font-bold">L</div>
                         <h3 className="text-2xl font-extrabold tracking-tighter font-stencil">LEGACY <span className="text-white">CAP STORE</span></h3>
                      </div>
                    </div>
                    
                    {/* Columna Derecha: Redes Sociales */}
                    <div className="md:text-right">
                      <h4 className="font-bold mb-4 text-white uppercase tracking-wider text-sm">Síguenos</h4>
                      <div className="flex gap-4 md:justify-end">
                        <a href="https://www.instagram.com/legacycapstore/" target="_blank" rel="noopener noreferrer" className="w-10 h-10 border border-gray-700 rounded-full flex items-center justify-center hover:bg-white hover:text-black transition-colors"><Instagram className="w-5 h-5"/></a>
                      </div>
                    </div>
                  </div>
                  <div className="border-t border-gray-800 pt-8 text-center text-gray-500 text-sm"><p>&copy; 2026 Legacy Cap Store. Todos los derechos reservados.</p></div>
                </div>
              </footer>
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
