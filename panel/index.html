<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Cap Store | Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; }
        .input-style { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px; width: 100%; color: white; }
        .input-style:focus { border-color: #3b82f6; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen flex flex-col items-center justify-center relative">

    <div id="loginSection" class="w-full max-w-md card p-10 shadow-2xl text-center">
        <div class="w-20 h-20 bg-white text-black flex items-center justify-center rounded-2xl mx-auto mb-8 text-4xl font-black" style="font-family: 'Impact', sans-serif; letter-spacing: 0.05em;">L</div>
        <h2 class="text-2xl font-bold mb-2 uppercase tracking-tighter italic">Panel de Control</h2>
        <p class="text-gray-500 text-sm mb-8">Acceso exclusivo para administradores</p>
        
        <button onclick="loginConGoogle()" class="flex items-center justify-center gap-3 w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-gray-200 transition-all active:scale-95 shadow-lg">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6" alt="Google">
            ENTRAR CON GOOGLE
        </button>
    </div>

    <div id="editModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden backdrop-blur-sm">
        <div class="card p-8 w-full max-w-md shadow-2xl border border-blue-500/30">
            <h2 class="text-xl font-bold mb-6 text-blue-400 italic uppercase">Editar Información</h2>
            <input type="hidden" id="editId">
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-500 uppercase font-bold">Marca</label>
                    <input type="text" id="editMarca" class="input-style">
                </div>
                <div>
                    <label class="text-xs text-gray-500 uppercase font-bold">Modelo</label>
                    <input type="text" id="editModelo" class="input-style">
                </div>
                <div>
                    <label class="text-xs text-gray-500 uppercase font-bold">Precio ($)</label>
                    <input type="number" id="editPrecio" class="input-style">
                </div>
                
                <div class="pt-4 pb-2 border-t border-gray-800 flex flex-col gap-3">
                    <label class="flex items-center text-sm font-bold text-gray-300 cursor-pointer">
                        <input type="checkbox" id="editNuevo" class="mr-3 w-5 h-5 accent-blue-600"> 
                        MANTENER ETIQUETA "NUEVO"
                    </label>
                    <label class="flex items-center text-sm font-bold text-gray-300 cursor-pointer">
                        <input type="checkbox" id="editAgotado" class="mr-3 w-5 h-5 accent-red-600"> 
                        MARCAR COMO AGOTADO
                    </label>
                </div>

                <div class="pt-2 pb-2 border-b border-gray-800">
                    <label class="text-xs text-gray-500 uppercase font-bold">Reemplazar Imágenes (Opcional)</label>
                    <input type="file" id="editFotoFile" multiple accept="image/*" class="mt-1 text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer w-full">
                    <p class="text-[10px] text-gray-500 mt-1">Sube nuevas fotos para borrar las anteriores. Déjalo vacío para conservarlas.</p>
                </div>

                <div class="flex gap-4 mt-8">
                    <button onclick="cerrarModal()" class="flex-1 bg-transparent border border-gray-600 text-white font-bold py-3 rounded-lg hover:bg-gray-800 transition-all">Cancelar</button>
                    <button onclick="guardarEdicion()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-all">Actualizar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="panelSection" class="w-full max-w-6xl mx-auto hidden">
        <header class="flex justify-between items-center mb-10 w-full">
            <h1 class="text-2xl font-bold tracking-widest uppercase italic text-white">Legacy <span class="text-blue-600">Panel</span></h1>
            <div class="flex gap-4 items-center">
                <span id="userName" class="text-xs text-gray-400"></span>
                <button onclick="cerrarSesion()" class="text-sm text-red-500 hover:text-red-400 underline decoration-red-500/30">Cerrar Sesión</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 w-full">
            <div class="lg:col-span-1 card p-6 h-fit sticky top-6">
                <h2 class="text-lg font-semibold mb-6">Nueva Mercancía</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-gray-500 uppercase font-bold">Marca</label>
                        <input type="text" id="marca" placeholder="New Era" class="input-style mt-1">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 uppercase font-bold">Modelo</label>
                        <input type="text" id="modelo" placeholder="59Fifty Oakland" class="input-style mt-1">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 uppercase font-bold">Precio ($)</label>
                        <input type="number" id="precio" placeholder="1250" class="input-style mt-1">
                    </div>
                    
                    <div class="flex flex-col gap-3 py-3 border-y border-gray-800 mt-2">
                        <label class="flex items-center text-sm font-bold text-gray-300 cursor-pointer">
                            <input type="checkbox" id="checkNuevo" checked class="mr-3 w-4 h-4 accent-blue-600"> Etiqueta "NUEVO"
                        </label>
                        <label class="flex items-center text-sm font-bold text-gray-300 cursor-pointer">
                            <input type="checkbox" id="checkAgotado" class="mr-3 w-4 h-4 accent-red-600"> Iniciar como "AGOTADO"
                        </label>
                    </div>

                    <div>
                        <label class="text-xs text-gray-500 uppercase font-bold">Imágenes (Selecciona varias)</label>
                        <input type="file" id="fotoFile" multiple accept="image/*" class="mt-1 text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer w-full">
                        <p class="text-[10px] text-gray-500 mt-1">Puedes elegir 2 o más fotos para activar el carrusel.</p>
                    </div>
                    <button onclick="subirGorra()" id="btnPublicar" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-blue-600 hover:text-white transition-all duration-300 mt-4">
                        PUBLICAR GORRA
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h2 class="text-lg font-semibold mb-6 italic">Inventario Reciente</h2>
                <div id="listaGorras" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <p class="text-gray-600 italic">Cargando bodega...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsf68-7toj9JWHLWsa_4vydh64E-DpGRM",
            authDomain: "legacy-cap-store.firebaseapp.com",
            projectId: "legacy-cap-store",
            storageBucket: "legacy-cap-store.firebasestorage.app",
            messagingSenderId: "691149990442",
            appId: "1:691149990442:web:34759b3009d4e0c93a7153"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const storage = firebase.storage();
        const auth = firebase.auth();
        window.gorrasData = {};

        // --- LÓGICA DE LOGIN GOOGLE ---
        window.loginConGoogle = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch((error) => {
                alert("Error al entrar: " + error.message);
            });
        };

        auth.onAuthStateChanged((user) => {
            const loginSec = document.getElementById('loginSection');
            const panelSec = document.getElementById('panelSection');
            const body = document.querySelector('body');

            if (user) {
                if(user.email === "antoniofloreslaguna13@gmail.com") { 
                    loginSec.classList.add('hidden');
                    panelSec.classList.remove('hidden');
                    body.classList.remove('items-center', 'justify-center');
                    body.classList.add('items-start');
                    document.getElementById('userName').innerText = user.displayName;
                    cargarInventario();
                } else {
                    alert("Acceso denegado. No tienes permisos de administrador para Legacy Cap Store.");
                    auth.signOut();
                }
            } else {
                loginSec.classList.remove('hidden');
                panelSec.classList.add('hidden');
                body.classList.add('items-center', 'justify-center');
                body.classList.remove('items-start');
            }
        });

        window.cerrarSesion = () => auth.signOut();

        // --- PUBLICAR BORRADOR EN LA TIENDA ---
        window.publicarGorra = async (id) => {
            try {
                await db.collection("gorras").doc(id).update({
                    publicado: true
                });
                // No ocupamos alert, Firebase actualizará la pantalla automáticamente
            } catch (error) {
                alert("Error al publicar: " + error.message);
            }
        };

        // --- SUBIR MERCANCÍA DESDE EL PANEL ---
        window.subirGorra = async () => {
            const btn = document.getElementById('btnPublicar');
            const files = document.getElementById('fotoFile').files;
            const marca = document.getElementById('marca').value;
            const modelo = document.getElementById('modelo').value;
            const precio = document.getElementById('precio').value;
            const isNuevo = document.getElementById('checkNuevo').checked;
            const isAgotado = document.getElementById('checkAgotado').checked;

            if(files.length === 0 || !marca || !modelo || !precio) return alert("Llena todos los campos y elige al menos 1 foto");

            btn.disabled = true;
            btn.innerText = "SUBIENDO FOTOS...";

            try {
                const uploadPromises = Array.from(files).map(async (file) => {
                    const storageRef = storage.ref('gorras/' + Date.now() + '_' + file.name);
                    await storageRef.put(file);
                    return await storageRef.getDownloadURL();
                });

                const urlsArray = await Promise.all(uploadPromises);

                await db.collection("gorras").add({
                    marca, 
                    modelo, 
                    precio: Number(precio), 
                    urls: urlsArray, 
                    url: urlsArray[0], 
                    nuevo: isNuevo,
                    agotado: isAgotado,
                    publicado: true, // Nace publicada automáticamente
                    fecha: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("¡Gorra publicada con éxito!");
                document.getElementById('marca').value = "";
                document.getElementById('modelo').value = "";
                document.getElementById('precio').value = "";
                document.getElementById('fotoFile').value = "";
                document.getElementById('checkAgotado').checked = false;
                document.getElementById('checkNuevo').checked = true;
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "PUBLICAR GORRA";
            }
        };

        // --- CARGAR INVENTARIO ---
        function cargarInventario() {
            db.collection("gorras").orderBy("fecha", "desc").onSnapshot((snapshot) => {
                const container = document.getElementById('listaGorras');
                container.innerHTML = "";
                window.gorrasData = {}; 
                
                snapshot.forEach((doc) => {
                    const item = doc.data();
                    window.gorrasData[doc.id] = item; 
                    
                    const isBorrador = item.publicado === false; // Detectamos si es borrador
                    const opacityClass = item.agotado ? 'opacity-50 grayscale' : '';
                    const lineThroughClass = item.agotado ? 'line-through text-gray-500' : 'text-white';
                    const tagAgotado = item.agotado ? `<span class="bg-red-900/50 text-red-400 text-[10px] px-2 py-0.5 rounded border border-red-800 ml-2">Agotado</span>` : '';
                    const tagNuevo = item.nuevo && !item.agotado ? `<span class="bg-blue-900/50 text-blue-400 text-[10px] px-2 py-0.5 rounded border border-blue-800 ml-2">Nuevo</span>` : '';
                    const tagBorrador = isBorrador ? `<span class="bg-yellow-900/50 text-yellow-400 text-[10px] px-2 py-0.5 rounded border border-yellow-500 ml-2 animate-pulse font-bold">BORRADOR</span>` : '';
                    const displayImage = item.urls && item.urls.length > 0 ? item.urls[0] : (item.url || 'https://via.placeholder.com/150');

                    // Dibujamos la tarjeta (con un diseño especial si es borrador)
                    container.innerHTML += `
                        <div class="card p-4 flex flex-col gap-3 relative group transition-all hover:bg-gray-900 ${isBorrador ? 'border-yellow-600/50 bg-yellow-900/10' : ''}">
                            <div class="flex gap-4 items-center">
                                <img src="${displayImage}" class="w-16 h-16 object-cover rounded shadow-lg ${opacityClass}">
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center flex-wrap gap-y-1">
                                        <p class="text-[10px] text-gray-400 font-bold uppercase">${item.marca}</p>
                                        ${tagNuevo}
                                        ${tagAgotado}
                                        ${tagBorrador}
                                    </div>
                                    <p class="font-bold text-sm truncate ${lineThroughClass}">${item.modelo}</p>
                                    <p class="text-green-400 text-sm">$${item.precio}</p>
                                </div>
                                <div class="flex flex-col gap-2">
                                    <button onclick="abrirModal('${doc.id}')" title="Editar" class="bg-blue-900/30 text-blue-400 p-2 rounded hover:bg-blue-600 hover:text-white transition-colors">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                    </button>
                                    <button onclick="eliminarGorra('${doc.id}')" title="Eliminar" class="bg-red-900/30 text-red-400 p-2 rounded hover:bg-red-600 hover:text-white transition-colors">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </div>
                            ${isBorrador ? `
                                <button onclick="publicarGorra('${doc.id}')" class="w-full bg-green-900/30 text-green-400 border border-green-800/50 py-2 rounded text-xs font-bold hover:bg-green-600 hover:text-white transition-all flex justify-center items-center gap-2 mt-1 shadow-lg">
                                    🚀 PUBLICAR EN LA TIENDA
                                </button>
                            ` : ''}
                        </div>
                    `;
                });
            });
        }

        // --- ELIMINAR GORRA Y SUS FOTOS ---
        window.eliminarGorra = async (id) => {
            if(confirm("¿Estás seguro de que quieres eliminar esta gorra y TODAS sus fotos de la base de datos?")) {
                try { 
                    const data = window.gorrasData[id];
                    if (!data) return;

                    let fotosABorrar = [];
                    if (data.urls && data.urls.length > 0) fotosABorrar = data.urls;
                    else if (data.url) fotosABorrar = [data.url];

                    for (let linkFoto of fotosABorrar) {
                        if (linkFoto && linkFoto.includes("firebasestorage")) {
                            try { await storage.refFromURL(linkFoto).delete(); } 
                            catch (errorImagen) { console.log("La imagen ya no existía", errorImagen); }
                        }
                    }

                    await db.collection("gorras").doc(id).delete(); 
                } 
                catch(e) { alert("Error al eliminar: " + e.message); }
            }
        };

        window.abrirModal = (id) => {
            const data = window.gorrasData[id];
            document.getElementById('editId').value = id;
            document.getElementById('editMarca').value = data.marca;
            document.getElementById('editModelo').value = data.modelo;
            document.getElementById('editPrecio').value = data.precio;
            document.getElementById('editNuevo').checked = data.nuevo !== false; 
            document.getElementById('editAgotado').checked = data.agotado || false;
            document.getElementById('editFotoFile').value = ""; 
            document.getElementById('editModal').classList.remove('hidden');
        };

        window.cerrarModal = () => document.getElementById('editModal').classList.add('hidden');

        // --- GUARDAR EDICIÓN ---
        window.guardarEdicion = async () => {
            const id = document.getElementById('editId').value;
            const marca = document.getElementById('editMarca').value;
            const modelo = document.getElementById('editModelo').value;
            const precio = document.getElementById('editPrecio').value;
            const isNuevo = document.getElementById('editNuevo').checked;
            const isAgotado = document.getElementById('editAgotado').checked;
            const files = document.getElementById('editFotoFile').files; 

            const btnActualizar = document.querySelector('#editModal button:last-child');
            const originalText = btnActualizar.innerText;
            btnActualizar.disabled = true;
            btnActualizar.innerText = "ACTUALIZANDO...";

            try {
                let updateData = {
                    marca: marca,
                    modelo: modelo,
                    precio: Number(precio),
                    nuevo: isNuevo,
                    agotado: isAgotado
                };

                if (files.length > 0) {
                    btnActualizar.innerText = "SUBIENDO FOTOS NUEVAS...";
                    
                    const uploadPromises = Array.from(files).map(async (file) => {
                        const storageRef = storage.ref('gorras/' + Date.now() + '_' + file.name);
                        await storageRef.put(file);
                        return await storageRef.getDownloadURL();
                    });

                    const urlsArray = await Promise.all(uploadPromises);
                    updateData.urls = urlsArray;
                    updateData.url = urlsArray[0];

                    btnActualizar.innerText = "LIMPIANDO FOTOS VIEJAS...";
                    const dataAntigua = window.gorrasData[id];
                    let fotosViejas = [];
                    if (dataAntigua.urls && dataAntigua.urls.length > 0) fotosViejas = dataAntigua.urls;
                    else if (dataAntigua.url) fotosViejas = [dataAntigua.url];

                    for (let linkFoto of fotosViejas) {
                        if (linkFoto && linkFoto.includes("firebasestorage")) {
                            try { await storage.refFromURL(linkFoto).delete(); } 
                            catch(e) { console.log("Error limpiando foto vieja."); }
                        }
                    }
                }

                await db.collection("gorras").doc(id).update(updateData);
                cerrarModal();
            } catch(e) { 
                alert("Error al actualizar: " + e.message); 
            } finally {
                btnActualizar.disabled = false;
                btnActualizar.innerText = originalText;
            }
        };
    </script>
</body>
</html>
