<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Legacy Cap Store | Panel</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f8;
margin:0;
}

header{
background:#111;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card img{
width:100%;
border-radius:6px;
}

.price{
font-weight:bold;
margin-top:5px;
}

.tag{
display:inline-block;
padding:4px 8px;
border-radius:5px;
font-size:12px;
margin-top:5px;
}

.new{
background:#2ecc71;
color:white;
}

.sold{
background:#e74c3c;
color:white;
}

.actions{
margin-bottom:25px;
}

button{
background:#111;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
Legacy Cap Store Admin
</header>

<div class="container">

<div class="actions">
<button onclick="location.href='/admin'">Editar inventario</button>
</div>

<div class="grid" id="grid"></div>

</div>

<script>

fetch("/catalogo.json")
.then(res=>res.json())
.then(data=>{

const grid=document.getElementById("grid")

data.gorras.forEach(gorra=>{

let img = gorra.imagenes?.[0]?.foto || ""

let tags=""

if(gorra.nuevo){
tags+=`<span class="tag new">Nuevo</span>`
}

if(gorra.agotado){
tags+=`<span class="tag sold">Agotado</span>`
}

grid.innerHTML+=`

<div class="card">

<img src="${img}">

<h3>${gorra.marca} ${gorra.modelo}</h3>

<div class="price">$${gorra.precio}</div>

${tags}

</div>

`

})

})

</script>

</body>
</html>
