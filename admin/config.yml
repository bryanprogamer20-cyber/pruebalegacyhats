backend:
  name: git-gateway
  branch: main
  publish_mode: editorial_workflow

media_folder: "imagenes"
public_folder: "/imagenes"

collections:
  - name: "catalogo"
    label: "🧢 Catálogo de Gorras"

    files:
      - label: "Inventario"
        name: "inventario"
        file: "catalogo.json"
        description: "Administra el inventario de Legacy Cap Store"

        fields:
          - label: "Inventario de Gorras"
            name: "gorras"
            widget: "list"

            summary: "🧢 {{fields.marca}} | {{fields.modelo}} — ${{fields.precio}}"

            fields:

              - label: "Información del Producto"
                name: "info"
                widget: "object"
                collapsed: false
                fields:

                  - {label: "Marca", name: "marca", widget: "string"}

                  - {label: "Modelo", name: "modelo", widget: "string"}

                  - {label: "Precio", name: "precio", widget: "number", value_type: "float"}

              - label: "Galería de Fotos"
                name: "imagenes"
                widget: "list"
                summary: "📷 Imagen cargada"
                field:
                  label: "Subir Foto"
                  name: "foto"
                  widget: "image"

              - label: "Estado del Producto"
                name: "estado"
                widget: "object"
                collapsed: true
                fields:

                  - label: "¿Es producto nuevo?"
                    name: "nuevo"
                    widget: "boolean"
                    default: true
                    required: false

                  - label: "¿Está agotado?"
                    name: "agotado"
                    widget: "boolean"
                    default: false
                    required: false